metric: COCO
num_classes: 8

TrainDataset:
  name: Mutisprctral_COCODataSet
  vis_image_dir: train_imgs/vis_imgs
  ir_image_dir : train_imgs/ir_imgs
  anno_path: Annotations/train.json
  dataset_dir: dataset/VEDAI512
  data_fields: ['image', 'gt_bbox', 'gt_class', 'is_crowd']

EvalDataset:
  name: Mutisprctral_COCODataSet
  vis_image_dir: val_imgs/vis_imgs
  ir_image_dir: val_imgs/ir_imgs
  anno_path: Annotations/val.json
  dataset_dir: dataset/VEDAI512
  allow_empty: true

TestDataset:
  name: Multi_ImageFolder
  anno_path: Annotations/classes.txt # also support txt (like VOC's label_list.txt)
  dataset_dir: dataset/VEDAI512 # if set, anno_path will be 'dataset_dir/anno_path'
